services:
  - type: web
    name: samp-market
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: samp-market-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: JWT_SECRET
        generateValue: true
